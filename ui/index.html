<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SealedBid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <style>
      html, body, #root { height: 100%; }
      body { margin: 0; background: #09090b; color: #f4f4f5; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      @keyframes fadeInDown {
        from { opacity: 0; transform: translateY(-8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-in { animation: fadeInDown 200ms ease-out; }
      @keyframes flashGreen {
        0%   { background-color: rgba(34,197,94,0.0); }
        20%  { background-color: rgba(34,197,94,0.35); }
        100% { background-color: rgba(34,197,94,0.0); }
      }
      .flash-green { animation: flashGreen 600ms ease-out; }
      @keyframes fadeOut {
        from { opacity: 1; max-height: 240px; margin-bottom: 0.5rem; }
        to   { opacity: 0; max-height: 0; margin-bottom: 0; }
      }
      .fading-out { animation: fadeOut 600ms ease-in forwards; pointer-events: none; }

      /* ─── Arcade view ──────────────────────────────────────────────── */
      .arcade { font-family: 'Press Start 2P', system-ui, monospace; }
      .arcade-bg {
        background:
          radial-gradient(ellipse at center, #1a0633 0%, #050108 70%);
      }
      /* CSS-only starfield: three layers of dots with different parallax speeds. */
      .stars, .stars2, .stars3 {
        position: absolute; inset: 0; pointer-events: none;
      }
      .stars {
        background-image: radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
          radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)),
          radial-gradient(1px 1px at 50px 160px, #fff, rgba(0,0,0,0)),
          radial-gradient(1px 1px at 90px 40px, #fff, rgba(0,0,0,0)),
          radial-gradient(2px 2px at 130px 80px, #fff, rgba(0,0,0,0)),
          radial-gradient(1px 1px at 160px 120px, #fff, rgba(0,0,0,0)),
          radial-gradient(1px 1px at 200px 50px, #fff, rgba(0,0,0,0));
        background-repeat: repeat;
        background-size: 220px 220px;
        opacity: 0.5;
        animation: drift 60s linear infinite;
      }
      .stars2 {
        background-image: radial-gradient(1px 1px at 40px 100px, #f0abfc, rgba(0,0,0,0)),
          radial-gradient(1px 1px at 90px 30px, #f0abfc, rgba(0,0,0,0)),
          radial-gradient(2px 2px at 140px 170px, #f0abfc, rgba(0,0,0,0));
        background-repeat: repeat;
        background-size: 280px 280px;
        opacity: 0.4;
        animation: drift 90s linear infinite reverse;
      }
      .stars3 {
        background-image: radial-gradient(1px 1px at 20px 50px, #67e8f9, rgba(0,0,0,0)),
          radial-gradient(2px 2px at 100px 200px, #67e8f9, rgba(0,0,0,0)),
          radial-gradient(1px 1px at 180px 80px, #67e8f9, rgba(0,0,0,0));
        background-repeat: repeat;
        background-size: 360px 360px;
        opacity: 0.35;
        animation: drift 120s linear infinite;
      }
      @keyframes drift {
        from { background-position: 0 0; }
        to   { background-position: -440px 440px; }
      }

      /* Subtle ship hover bob. */
      @keyframes bob {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-6px); }
      }
      .ship { animation: bob 2.4s ease-in-out infinite; }

      /* Ship recoil on bid fire. */
      @keyframes recoil {
        0%   { transform: translateY(0); }
        20%  { transform: translateY(-12px); }
        100% { transform: translateY(0); }
      }
      .ship-fire { animation: recoil 350ms ease-out; }

      /* Vault pulse on job-posted. */
      @keyframes vaultPulse {
        0%   { box-shadow: 0 0 0 0 rgba(217, 70, 239, 0.7); }
        70%  { box-shadow: 0 0 0 28px rgba(217, 70, 239, 0); }
        100% { box-shadow: 0 0 0 0 rgba(217, 70, 239, 0); }
      }
      .vault-pulse { animation: vaultPulse 900ms ease-out; }

      /* Vault TEE-green flip on delegate. */
      @keyframes vaultFlash {
        0%   { filter: brightness(1); }
        50%  { filter: brightness(2.2) saturate(1.5); }
        100% { filter: brightness(1); }
      }
      .vault-flash { animation: vaultFlash 600ms ease-out; }

      /* Bid projectile — fired from a ship's x-coordinate to the vault. The
         component sets --start-x, --end-x as CSS vars so we can animate any
         provider-to-vault path with one keyframe. */
      @keyframes projectile {
        0% {
          transform: translate(var(--start-x, 0px), var(--start-y, 0px)) scale(1);
          opacity: 1;
        }
        85% { opacity: 1; }
        100% {
          transform: translate(var(--end-x, 0px), var(--end-y, 0px)) scale(0.6);
          opacity: 0;
        }
      }
      .projectile {
        animation: projectile var(--dur, 800ms) cubic-bezier(0.25, 0.65, 0.55, 1) forwards;
      }

      /* Settlement coin: vault → winner. */
      @keyframes coinFly {
        0%   { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
        100% { transform: translate(var(--end-x, 0px), var(--end-y, 0px)) rotate(540deg) scale(0.9); opacity: 0; }
      }
      .coin {
        animation: coinFly 1100ms cubic-bezier(0.45, 0.0, 0.55, 1.5) forwards;
      }

      /* Winner banner. */
      @keyframes winnerPop {
        0%   { transform: translateY(8px) scale(0.7); opacity: 0; }
        25%  { transform: translateY(-2px) scale(1.1); opacity: 1; }
        100% { transform: translateY(0) scale(1); opacity: 1; }
      }
      .winner-banner { animation: winnerPop 500ms cubic-bezier(0.34, 1.56, 0.64, 1); }
      @keyframes loserFade {
        from { opacity: 1; }
        to   { opacity: 0.25; }
      }
      .loser-fade { animation: loserFade 700ms ease-out forwards; }

      /* Glow that the vault uses while delegated. */
      .glow-magenta {
        box-shadow: 0 0 18px 2px rgba(217, 70, 239, 0.55), inset 0 0 12px rgba(217, 70, 239, 0.4);
      }
      .glow-cyan {
        box-shadow: 0 0 18px 2px rgba(103, 232, 249, 0.6), inset 0 0 12px rgba(103, 232, 249, 0.45);
      }
      .glow-green {
        box-shadow: 0 0 22px 2px rgba(34, 197, 94, 0.65), inset 0 0 14px rgba(34, 197, 94, 0.45);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
